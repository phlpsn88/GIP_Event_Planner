<!DOCTYPE html>
<html lang="nl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registreren</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="icon" href="img/calendar-days-regular-full.svg">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/login_register.css">
  <script type="module" src="js/auth.js"></script>
</head>

<body>
  <div class="container">
    <h1>Beginnen</h1>
    <form id="registerForm">
      <div class="form-group">
        <label>Naam</label>
        <input type="text" id="naam" placeholder="Naam">
      </div>

      <div class="form-group">
        <label>E-mail</label>
        <input type="text" id="email" placeholder="E-mail">
      </div>

      <div class="form-group">
        <label>Wachtwoord</label>
        <input type="password" id="wachtwoord" placeholder="Wachtwoord">
      </div>

      <div class="checkbox-container">
        <input type="checkbox" id="terms">
        <label for="terms">Ik accepteer de voorwaarden</label>
      </div>

      <button type="submit" class="btn">Registreer</button>
    </form>

    <p id="foutmelding" class="error-message-authentication link" hidden></p>

    <div class="link">
      Heeft u al een account? <a href="login.html">Log in</a>
    </div>
    
    <div class="link">
      <a href="index.html">< Terug naar home</a>
    </div>
  </div>

  <!-- Achtergrond -->
  <div class="decor-lock">🔒</div>
  <div class="decor-lock2">🔒</div>
</body>
</html>
